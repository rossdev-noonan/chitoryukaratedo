current_phase:
  name: "Homepage Figma sync (holding) + Sanity/Supabase content architecture planning"
  status: "IN PROGRESS — paused mid-decision"
  summary: >
    Ross said "let Gil finish first" on further homepage Figma sync — that
    thread is intentionally paused, not abandoned. Current focus shifted to
    making content genuinely dynamic (Sanity for marketing content, Supabase
    already dynamic for operational data) instead of hardcoded, specifically
    so Adrian (SEO) can self-serve page copy and SEO metadata.
  findings_this_session:
    - "Sanity project IS live and connected (credentials all valid, verified via a real query) — but the dataset is COMPLETELY EMPTY. Zero page/newsPost/event documents exist, only Sanity's internal system records."
    - "Existing Sanity schema (page/newsPost/event) has NO locale/i18n support at all — a blocker for any real content entry given the site is 9-locale."
    - "Public /news and /events pages already query Sanity (not Supabase) and currently render empty lists against the live empty dataset — not broken, just no content yet."
    - "Homepage sections (hero, trust bar, philosophy, CTA) are hardcoded in code/dictionaries, not connected to any CMS."
  blocking_question_awaiting_ross:
    question: >
      Two options for how Sanity should own homepage/page content — asked
      2026-07-15, not yet answered:
    option_a:
      name: "SEO-focused (recommended)"
      description: >
        Sanity manages page BODY content + SEO metadata (title/description)
        per page per locale for the static marketing pages (About, History,
        Leadership, Resources, etc.) and News/Events. Homepage's structural/
        animated sections (hero copy, trust bar, CTA banner) STAY in code/
        dictionaries as-is, since they're tightly coupled to layout/animation
        (e.g. hero's red-highlight-word line-splitting) and not really
        freeform "content." Adrian gets full self-serve SEO control without
        translation-maintenance burden or hero-design breakage risk.
    option_b:
      name: "Full CMS"
      description: >
        Every homepage section becomes Sanity-editable too, including hero
        copy. Requires adding real locale support to the Sanity schema
        (Sanity has no built-in i18n — needs either the
        @sanity/document-internationalization plugin or a manual
        locale-object-per-field pattern) and shifts translation-maintenance
        from AI-generated dictionaries onto Adrian/Sanity content editors.
        Bigger build, bigger ongoing content-ops burden, higher risk of
        breaking hero's design-coupled layout via freeform edits.

