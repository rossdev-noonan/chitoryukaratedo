# ----------------------------------------------------------------------------
# STANDING CONVENTIONS — do not relitigate these, they're settled
# ----------------------------------------------------------------------------
conventions:
  commit_message_format: "YYYY-MM-DD_short-description-of-changes_changesdone (NOT conventional-commit style, per Ross's explicit preference set 2026-07-08)"
  git_push_policy: "Always commit to main. NEVER push without Ross's explicit ask, every single time — a prior push approval does not carry forward to later commits."
  github_account: "ONLY use rossdev-noonan. NEVER suggest or use RossDev1201 — tied to a locked/compromised email."
  design_hold_policy: "Historically: no visual design work until Gil's Figma/MCP handoff. That hold is now lifted for pages Gil has actually designed (homepage). Other pages remain structural-only until their Figma comps land."
  real_data_only_policy: >
    Never fabricate content (duplicate events, fake dojo phone numbers,
    invented stats) to match a Figma mockup's placeholder-looking content.
    If real data doesn't exist for a design element, omit it or ask —
    do not invent plausible-looking fake data. This has been enforced
    multiple times (duplicate event cards bug, continent dojo counts,
    dojo phone/HQ badge fields, Upcoming Events real-data flag).
  figma_verification_policy: >
    Always re-fetch get_design_context scoped to the EXACT node before
    building or fixing a section — never build from a stale full-page
    dump or from memory of an earlier fetch. Use real icon/image assets
    downloaded from Figma, never generic Lucide/stock substitutes. For
    animated components, also fetch get_motion_context — don't guess at
    timing/easing. Figma's remote MCP only sees the file's top-level
    'Branding' page; the desktop app's local Dev Mode MCP is required to
    see Gil's latest unpublished edits — use computer-use to check the
    desktop app when the remote MCP seems stale.
