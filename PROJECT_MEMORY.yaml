# ============================================================================
# PROJECT_MEMORY.yaml
# Comprehensive build memory for the Chito-Ryu International website.
# Purpose: let any agent/tool (Claude Code, Codex, a human dev) pick up this
# project cold — with zero prior conversation history — and understand what
# exists, why it exists, what's still open, and what NOT to redo or break.
#
# Update this file at the end of every work session / phase milestone.
# Keep entries factual and dated. Do not delete history — append.
# ============================================================================

meta:
  document_purpose: >
    Single source of truth for project state, meant to survive a transition
    to a different coding agent or human developer. Read this file in full
    before making any architectural changes.
  last_updated: "2026-07-15"
  maintained_by: "Claude Code sessions, updated per session/phase"
  companion_docs:
    - path: chito-ryu-build-procedure-codex-claude.md
      purpose: "Original phase-by-phase build spec (Phases 1-8) this project was built against"
    - path: handover-to-gil.md
      purpose: "Running handoff doc to Gil (designer) — build status, open design questions, schema gaps"
    - path: sitemap-and-routing.md
      purpose: "Canonical route list and routing conventions"
    - path: AGENTS.md
      purpose: "Points agents to node_modules/next/dist/docs — this Next.js version (16) has real breaking changes from training-data assumptions"

project:
  name: "Chito-Ryu International"
  description: >
    Official international website for the Chito-Ryu Karate-Do federation.
    Public marketing/directory site + gated admin panel for federation staff
    to manage dojos, teachers, users, approvals, rank evidence.
  domain: "chitoryukaratedo.com"
  repo: "https://github.com/rossdev-noonan/chitoryukaratedo"
  status: "pre-launch, actively building, deployed to Vercel production URL"
  local_path: "D:\\iCKF"

stakeholders:
  - name: Ross
    github: rossdev-noonan
    role: "Site owner / primary decision maker. Non-technical. Pushes to git himself (never push without his explicit ask each session). Wants terse reports, no jargon for Mike."
  - name: Gil
    role: "Designer. Owns Figma file 'Chito Ryu Intl Website' (fileKey 6zDwLFntGwVpIYdgnZmq8M). Iterates frequently and without notice — re-fetch design_context per section before building, never trust a stale full-page dump."
  - name: Adrian
    role: "SEO. Will need Sanity Studio access once content model is ready — his real need is meta titles/descriptions and page body copy per locale, not touching hero/animation-coupled copy."
  - name: Mike Noonan
    role: "CEO stakeholder. Reports to him must be short, plain-English, zero technical terms."
  - name: Sheehan
    role: "Executive Assistant to Mike. Owns billing/card-on-file decisions (Sanity Pro, Supabase Pro upgrades gated on this)."

# ----------------------------------------------------------------------------
# TECH STACK
# ----------------------------------------------------------------------------
tech_stack:
  framework: "Next.js 16 (App Router, Turbopack) — NOTE: real breaking changes vs training data, e.g. middleware.ts renamed to proxy.ts. Always check node_modules/next/dist/docs before assuming API shape."
  language: "TypeScript, strict"
  styling: "Tailwind CSS v4 (@theme inline token system in app/globals.css)"
  ui_scaffold: "shadcn/ui (components/ui/* — mostly UNUSED scaffold, see known_gaps)"
  animation: "Framer Motion, imported as `motion/react` (package name `motion` v12.x)"
  icons: "lucide-react + real bespoke SVG/PNG assets pulled from Figma per-section (not generic icon substitutes)"
  cms: "Sanity (project ID 3425k2is, dataset production) — content layer for marketing pages, News, Events"
  database: "Supabase (org 'Chito-Ryu International', project 'chitoryukaratedo', Free tier as of last check) — structured operational data: users/roles, countries, dojos, teachers, approvals, rank_evidence, audit_logs"
  auth: "Supabase Auth (invite-only, no public signup), cookie-based via @supabase/ssr"
  hosting: "Vercel, Pro plan, auto-deploys main to production (no staging branch yet)"
  email: "Resend planned for transactional email — NOT yet set up; Supabase's shared rate-limited test mailer is in use for invite/reset emails meanwhile"
  bot_protection: "Cloudflare Turnstile on the public contact form"
  rate_limiting: "Upstash Redis (@upstash/ratelimit)"
  validation: "Zod on every Server Action input"
  testing: "Playwright E2E (49 tests as of last count), @axe-core/playwright for accessibility"
  i18n: "Custom App Router pattern (app/[lang]/...), no external i18n library — 9 locales"
  domain_registrar: "TPPWholesale — DNS changes deliberately deferred until launch"

# ----------------------------------------------------------------------------
# ARCHITECTURE
# ----------------------------------------------------------------------------
architecture:
  routing:
    pattern: "app/[lang]/(public)/... and app/[lang]/(auth)/... — locale-prefixed via Next.js's own documented App Router i18n pattern"
    admin: "app/admin/... — UNPREFIXED, English-only, guarded by proxy.ts (matches Gil's brief: admin is 'low-personality', never discussed as multilingual)"
    api: "app/api/... — unprefixed, excluded from locale proxy matcher"
    proxy: >
      proxy.ts (Next 16 renamed middleware.ts -> proxy.ts) does two jobs:
      (1) /admin/* auth gate via supabase.auth.getUser() + redirect to /{locale}/login if unauthenticated,
      (2) locale detection/redirect for everything else: cookie (NEXT_LOCALE, sticky) > geo (x-vercel-ip-country / cf-ipcountry headers) > Accept-Language > default 'en'.

  content_ownership_split:
    supabase_owns: "countries, dojos, teachers, users/roles, approvals queue, rank_evidence, audit_logs — all admin-editable via /admin/* with real RLS + Server Action role checks"
    sanity_owns_intended: "generic marketing page bodies (page schema), newsPost, event — schema exists, wired to public query layer, but DATASET IS EMPTY (see current_phase). No locale support in schema yet."
    hardcoded_in_code: >
      Homepage sections (hero copy, trust bar stats, philosophy text, CTA banner, origins accordion)
      live in lib/homepage-content.ts + lib/i18n/dictionaries/*.json. NOT in Sanity or Supabase.
      This was a deliberate interim decision (2026-07-10) so a future Sanity swap is a one-file change,
      but that swap has not happened yet — see open_decisions.

  i18n:
    locales: ["en", "ja", "yue", "no", "zh", "ms", "ta", "sv", "bn"]
    locale_names: "English, Japanese, Cantonese, Norwegian, Mandarin, Malay, Tamil, Swedish, Bengali"
    default_locale: "en"
    dictionary_files: "lib/i18n/dictionaries/{locale}.json, typed via lib/i18n/types.ts (Dictionary interface)"
    translation_provenance: >
      CAVEAT — repeat to Ross/Adrian before treating any non-English copy as launch-final:
      all non-English translations were AI-generated by Claude sessions, not a professional
      translation service or native speaker. Cantonese, Mandarin, Norwegian, Malay, Tamil,
      Swedish, Bengali copy — especially martial-arts terminology and formal federation
      register — needs native-speaker review before launch.
    fonts_per_script: "Noto Serif JP (headings/kanji), Inter (body/Latin), Noto Sans HK (Cantonese), Noto Sans SC (Mandarin), Noto Sans Tamil, Noto Sans Bengali — loaded conditionally per-locale, not on <html>, so unused locales don't cost other visitors bandwidth"
    other_pages_status: "Non-homepage public pages (About, History, Leadership, etc.) keep ENGLISH placeholder body text under every locale prefix — chrome (nav/footer) is fully translated/functional, but page body copy was deliberately not translated since it's structural placeholder pending real design/content"

  auth_roles:
    - role: sohonbu_admin
      description: "Full access — only role that can write directly to real tables, review/approve queue items, manage users, delete nothing from audit_logs (nobody can)"
    - role: country_admin
      description: "Can only submit (not directly write) changes scoped to their own country_id"
    - role: dojo_admin
      description: "Can only submit changes scoped to their own dojo_id"
    - role: teacher
      description: "Can submit rank_evidence for themselves; blocked from dojo/teacher submissions"
  auth_roles_enforcement: "Defense in depth — Server Actions check role server-side AND Supabase RLS policies independently enforce the same rules at the database layer (closed a real direct-REST-API bypass gap on 2026-07-08, migration 0005)"

  key_directories:
    "app/[lang]/(public)/": "Public marketing/directory pages"
    "app/[lang]/(auth)/": "Login, accept-invite, reset-password"
    "app/admin/": "Gated admin panel"
    "app/api/": "revalidate webhook (Sanity -> ISR), no other API routes built"
    "components/public/home/": "Homepage section components (HomeHero, HomeFeatureBar, HomeUpcomingEvents, HomeOrigins, HomeCTA, HomeDojoFinder, etc.)"
    "components/admin/": "Admin panel components"
    "lib/": "Data access layer — directory.ts, auth.ts, admin-records.ts, approvals.ts, rank-evidence.ts, homepage-content.ts, continents.ts, i18n/, sanity/, supabase/"
    "supabase/migrations/": "All schema changes as numbered .sql files, applied by hand via Supabase SQL Editor (no Supabase CLI wired into this repo)"
    "sanity/schemaTypes/": "page.ts, newsPost.ts, event.ts — minimal, no locale support yet"

